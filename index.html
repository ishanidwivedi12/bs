<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise </title>

<link rel="stylesheet" href="style.css">


</head>

<body>

<!-- Loading Screen -->
<div id="loading-screen">

    <div class="heart">💌</div>

    <h1>Hey Birthday Girl...</h1>

    <p>Preparing your surprise...</p>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

</div>

<!-- Passcode Screen -->
<div id="passcode-screen">

    <h2>Enter Passcode</h2>

    <div id="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <div class="keypad">

        <button onclick="press(1)">1</button>
        <button onclick="press(2)">2</button>
        <button onclick="press(3)">3</button>

        <button onclick="press(4)">4</button>
        <button onclick="press(5)">5</button>
        <button onclick="press(6)">6</button>

        <button onclick="press(7)">7</button>
        <button onclick="press(8)">8</button>
        <button onclick="press(9)">9</button>

        <button onclick="clearPass()">CLR</button>
        <button onclick="press(0)">0</button>
        <button onclick="backspace()">⌫</button>

    </div>

</div>

<!-- Unlock Screen -->
<div id="unlock-screen">

    <div class="unlock-heart">❤️</div>

    <h1>Welcome Cold Coffee with Chocalate Ice-Cream...</h1>

    <p>Unlocking your surprise...</p>

</div>

<!-- Envelope Screen -->

<!-- Envelope Screen -->
<div id="envelope-screen">

    <div class="envelope" onclick="openEnvelope()">

        <!-- Letter -->
        <div class="letter">

            <h2>💌</h2>
            <p>For Binal ❤️</p>

        </div>

        <!-- Flap -->
        <div class="flap"></div>

        <!-- Left Fold -->
        <div class="left"></div>

        <!-- Right Fold -->
        <div class="right"></div>

        <!-- Bottom -->
        <div class="bottom"></div>

    </div>

</div>

<!-- Letter Screen -->

<div id="letter-screen">

    <div class="birthday-letter">

        <h1>Happiest Birthday dear 🫶🏻</h1>

        <p id="typing-text"></p>

        <button onclick="showGallery()">
            Continue ❤️
        </button>

    </div>

</div>


<script>
  const message = `Happy Birthday! 🎂❤️

May this new chapter of your life bring confidence, success
and countless reasons to smile.

Stay kind, work hard and keep chasing your dreams.

Wishing you good health, happiness and a bright future.

Have a wonderful birthday!✨

Made with ❤️
For my cold coffee with chocolate ice-cream 🫂😘`;



let i=0;

function typeLetter(){

    const text=document.getElementById("typing-text");

    text.innerHTML="";

    i=0;

    const typing=setInterval(()=>{

        text.innerHTML+=message.charAt(i);

        i++;

        if(i>=message.length){

            clearInterval(typing);

        }

    },35);

}
</script>

<!-- Gallery Screen -->

<div id="gallery-screen">

    <h2>💖 Celebrating You 💖</h2>

    <div class="gallery">

         <!-- <div class="placeholder">
        📷
        <p>Add Your Favorite Photo</p>
    </div> -->

    <img id="gallery-image" src="photo1.jpg">


        

    </div>

    <div class="controls">

        <button onclick="previousPhoto()">◀</button>

        <span id="counter">
            1 / 8
        </span>

        <button onclick="nextPhoto()">▶</button>

    </div>

</div>



<script src="script.js"></script>


</body>
</html>
